<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaishi 1.5k — Flashcard Jepang-Indonesia</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --vermillion: #c0392b;
    --gold: #b5860d;
    --mist: #e8e2d6;
    --shadow: rgba(26,20,16,0.12);
    --card-h: 340px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 24px 14px;
    border-bottom: 2px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'DM Serif Display', 'Noto Serif JP', serif;
    font-size: 1.35rem;
    letter-spacing: 0.03em;
  }
  .logo span { color: var(--vermillion); }

  .sync-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .sync-status {
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: .04em;
  }
  .sync-status.idle     { background: var(--mist); color: #888; }
  .sync-status.syncing  { background: #fff3cd; color: #856404; }
  .sync-status.saved    { background: #d1f0da; color: #1a6b35; }
  .sync-status.error    { background: #fde8e8; color: #9b1c1c; }
  .sync-status.offline  { background: var(--mist); color: #888; }

  .btn-gdrive {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    background: white;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-gdrive:hover { background: var(--ink); color: white; }
  .btn-gdrive img { width: 16px; height: 16px; }

  .controls {
    padding: 14px 24px;
    border-bottom: 1px solid var(--mist);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 160px;
  }
  .search-wrap input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border: 1.5px solid var(--mist);
    border-radius: 6px;
    background: white;
    font-family: inherit;
    font-size: 0.88rem;
    color: var(--ink);
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--vermillion); }
  .search-wrap svg {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    opacity: .4;
  }
  select {
    padding: 8px 12px;
    border: 1.5px solid var(--mist);
    border-radius: 6px;
    background: white;
    font-family: inherit;
    font-size: 0.88rem;
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }
  .btn {
    padding: 8px 18px;
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    background: var(--ink);
    color: var(--paper);
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--vermillion); border-color: var(--vermillion); }
  .btn-outline {
    background: transparent;
    color: var(--ink);
  }
  .btn-outline:hover { background: var(--ink); color: var(--paper); }
  .btn-sm { padding: 6px 14px; font-size: 0.82rem; }

  .progress-bar-wrap {
    padding: 10px 24px;
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 0.8rem;
    color: #888;
    border-bottom: 1px solid var(--mist);
  }
  .progress-track {
    flex: 1;
    height: 5px;
    background: var(--mist);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--vermillion);
    border-radius: 99px;
    transition: width .4s ease;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px 32px;
    gap: 24px;
  }

  .card-scene {
    perspective: 1000px;
    width: min(480px, 100%);
    height: var(--card-h);
  }
  .card {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    border: 2px solid var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
    gap: 10px;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .card-front { background: white; }
  .card-back {
    background: var(--ink);
    color: var(--paper);
    transform: rotateY(180deg);
  }
  .card-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.4;
  }
  .card-vocab {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(2.5rem, 10vw, 4.2rem);
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
    text-align: center;
  }
  .card-reading { font-size: 1rem; color: var(--gold); font-family: 'Noto Serif JP', serif; }
  .card-hint { font-size: 0.75rem; opacity: 0.35; margin-top: 8px; }
  .card-num { position: absolute; top: 12px; right: 16px; font-size: 0.7rem; opacity: .3; font-weight: 500; }

  .card-back .card-meaning {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    color: #f5f0e8;
    text-align: center;
    line-height: 1.2;
  }
  .card-back .card-reading { color: var(--gold); font-size: 1.05rem; }
  .card-back .sentence-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.88rem;
    color: rgba(245,240,232,.7);
    text-align: center;
    line-height: 1.6;
    border-top: 1px solid rgba(255,255,255,.12);
    padding-top: 10px;
    margin-top: 4px;
  }
  .card-back .sentence-id {
    font-size: 0.8rem;
    color: rgba(245,240,232,.5);
    text-align: center;
    font-style: italic;
  }

  .nav-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .rating-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .rating-row .btn { font-size: 0.8rem; padding: 7px 18px; border-radius: 8px; }
  .btn-again { background: #c0392b; border-color: #c0392b; }
  .btn-hard  { background: #e67e22; border-color: #e67e22; }
  .btn-good  { background: #27ae60; border-color: #27ae60; }
  .btn-easy  { background: #2980b9; border-color: #2980b9; }
  .flip-hint { font-size: 0.75rem; color: #aaa; letter-spacing: .05em; }

  #list-view {
    display: none;
    padding: 16px 24px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }
  #list-view table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  #list-view th {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 2px solid var(--ink);
    font-size: 0.73rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--gold);
  }
  #list-view td { padding: 9px 10px; border-bottom: 1px solid var(--mist); vertical-align: middle; }
  #list-view tr:hover td { background: rgba(0,0,0,.02); }
  .vocab-cell { font-family: 'Noto Serif JP', serif; font-size: 1.1rem; font-weight: 700; }
  .reading-cell { color: var(--gold); font-size: 0.82rem; }
  .known-badge { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #27ae60; }

  .kbd-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .kbd { font-size: 0.7rem; background: var(--mist); border: 1px solid #ccc; border-radius: 4px; padding: 2px 7px; font-family: monospace; color: #666; }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--paper);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    transition: transform .3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">開始 <span>Kaishi</span> · Flashcard</div>
  <div class="sync-bar">
    <span class="sync-status idle" id="sync-status">● Belum login</span>
    <button class="btn-gdrive" id="gdrive-btn" onclick="handleAuthClick()">
      <img src="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" alt="Drive">
      Login Google Drive
    </button>
    <button class="btn btn-outline btn-sm" id="save-btn" onclick="saveToGDrive()" style="display:none">💾 Simpan</button>
    <button class="btn btn-outline btn-sm" id="logout-btn" onclick="handleSignOut()" style="display:none">Logout</button>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Cari vocab atau arti..." oninput="onSearch()">
  </div>
  <select id="mode-select" onchange="switchMode()">
    <option value="study">Mode Belajar</option>
    <option value="list">Daftar Kartu</option>
    <option value="random">Mode Acak</option>
    <option value="review">Ulangi Salah</option>
  </select>
  <button class="btn btn-outline btn-sm" onclick="resetAll()">Reset</button>
  <button class="btn btn-sm" onclick="shuffleDeck()">🔀 Acak</button>
</div>

<div class="progress-bar-wrap">
  <span id="progress-text">0 / 0</span>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <span id="score-label" style="color:var(--gold);font-weight:500"></span>
</div>

<main id="study-view">
  <div class="card-scene" onclick="flipCard()">
    <div class="card" id="the-card">
      <div class="card-face card-front">
        <div class="card-label">Bahasa Jepang</div>
        <div class="card-vocab" id="front-vocab">私</div>
        <div class="card-reading" id="front-reading">わたし</div>
        <div class="card-hint">Klik untuk lihat arti →</div>
        <div class="card-num" id="card-num">1 / 1500</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label" style="opacity:.3">Artinya</div>
        <div class="card-meaning" id="back-meaning">Saya</div>
        <div class="card-reading" id="back-reading">わたし</div>
        <div class="sentence-jp" id="back-sentence-jp">私はアンです。</div>
        <div class="sentence-id" id="back-sentence-id">Saya adalah Ann.</div>
      </div>
    </div>
  </div>

  <p class="flip-hint" id="flip-hint">Klik kartu atau tekan <strong>Spasi</strong> untuk balik</p>

  <div class="nav-row" id="nav-buttons">
    <button class="btn btn-outline btn-sm" onclick="prevCard()">← Sebelumnya</button>
    <button class="btn btn-sm" onclick="flipCard()">Balik Kartu</button>
    <button class="btn btn-sm" onclick="nextCard()">Berikutnya →</button>
  </div>

  <div class="rating-row" id="rating-buttons" style="display:none">
    <button class="btn btn-again btn-sm" onclick="rate('again')">🔁 Lagi</button>
    <button class="btn btn-hard btn-sm" onclick="rate('hard')">😓 Susah</button>
    <button class="btn btn-good btn-sm" onclick="rate('good')">👍 Paham</button>
    <button class="btn btn-easy btn-sm" onclick="rate('easy')">⭐ Mudah</button>
  </div>

  <div class="kbd-row">
    <span class="kbd">Spasi = balik</span>
    <span class="kbd">← → = navigasi</span>
    <span class="kbd">1=Lagi 2=Susah 3=Paham 4=Mudah</span>
  </div>
</main>

<div id="list-view">
  <table>
    <thead>
      <tr>
        <th>#</th><th>Vocab</th><th>Bacaan</th><th>Arti</th><th>Contoh</th><th>✓</th>
      </tr>
    </thead>
    <tbody id="list-body"></tbody>
  </table>
  <div class="empty" id="list-empty" style="display:none;text-align:center;padding:40px;color:#aaa">Tidak ada hasil.</div>
</div>

<div class="toast" id="toast"></div>

<script>

const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

const ALL_CARDS = [{"vocab":"私","reading":"わたし","meaning":"Saya","sentence_jp":"私はアンです。","sentence_id":"Saya [adalah] Ann."},{"vocab":"あなた","reading":"あなた","meaning":"Anda","sentence_jp":"あなたはトムさんですか。","sentence_id":"Apakah Anda Tom-san?"},{"vocab":"さん","reading":"さん (used with adults of equal status)","meaning":"Bapak/IbuSaudara/Saudari","sentence_jp":"あなたはトムさんですか。","sentence_id":"Apakah Anda Saudara Tom?"},{"vocab":"彼","reading":"かれ","meaning":"Dia (lk)","sentence_jp":"彼はトムさんです。","sentence_id":"Dia [adalah] Sdr. Tom."},{"vocab":"好き","reading":"すき","meaning":"Suka","sentence_jp":"私はワインが好きです。","sentence_id":"Saya suka wine."},{"vocab":"人","reading":"ひと","meaning":"Orang","sentence_jp":"あの人はいい人です。","sentence_id":"Orang itu adalah orang baik."},{"vocab":"いい","reading":"いい","meaning":"Baik","sentence_jp":"あの人はいい人です。","sentence_id":"Orang itu adalah orang baik."},{"vocab":"人","reading":"じん","meaning":"Orang (warga)","sentence_jp":"私はイギリス人です。","sentence_id":"Saya adalah orang Inggris."},{"vocab":"日本語","reading":"にほんご","meaning":"Bahasa Jepang","sentence_jp":"私は日本語を勉強しています。","sentence_id":"Saya sedang belajar bahasa Jepang."},{"vocab":"勉強","reading":"べんきょう","meaning":"Belajar","sentence_jp":"私は日本語を勉強しています。","sentence_id":"Saya sedang belajar bahasa Jepang."},{"vocab":"本","reading":"ほん","meaning":"Buku","sentence_jp":"いい本でしたね。","sentence_id":"Buku yang bagus, kan?"},{"vocab":"これ","reading":"これ","meaning":"Ini","sentence_jp":"これは日本語の本です。","sentence_id":"Ini adalah buku bahasa Jepang."},{"vocab":"何","reading":"なに・なん","meaning":"Apa","sentence_jp":"A「これは何ですか。」B「本です。」","sentence_id":"Ini apa?&nbsp;&nbsp;Buku."},{"vocab":"それ","reading":"それ","meaning":"Itu","sentence_jp":"それは本です。","sentence_id":"Itu adalah buku."},{"vocab":"あれ","reading":"あれ","meaning":"Itu","sentence_jp":"あれは何ですか。","sentence_id":"Itu apa?"},{"vocab":"どれ","reading":"どれ","meaning":"Mana","sentence_jp":"どれが好きですか。","sentence_id":"Mana yang kamu suka?"},{"vocab":"毎日","reading":"まいにち","meaning":"Setiap hari","sentenc // =========== GOOGLE AUTH ===========
function initGoogleAuth() {
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: () => {}
  });

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) {
        setSyncStatus('error', '● Login gagal');
        showToast('Login gagal: ' + resp.error);
        return;
      }
      accessToken = resp.access_token;
      setSyncStatus('syncing', '● Memuat progress...');
      document.getElementById('gdrive-btn').style.display = 'none';
      document.getElementById('save-btn').style.display = '';
      document.getElementById('logout-btn').style.display = '';
      await loadFromGDrive();
    }
  });
}

function handleAuthClick() {
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function handleSignOut() {
  google.accounts.oauth2.revoke(accessToken, () => {
    accessToken = null;
    driveFileId = null;
    setSyncStatus('idle', '● Belum login');
    document.getElementById('gdrive-btn').style.display = '';
    document.getElementById('save-btn').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
    showToast('Berhasil logout');
  });
}

function setSyncStatus(cls, text) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-status ' + cls;
  el.textContent = text;
}

    // Search for existing file in appDataFolder
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id,name)`,
      { headers: { Authorization: 'Bearer ' + accessToken } }
    );
    const data = await res.json();

    if (data.files && data.files.length > 0) {
      driveFileId = data.files[0].id;
      // Download content
      const fileRes = await fetch(
        `https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
        { headers: { Authorization: 'Bearer ' + accessToken } }
      );
      const progress = await fileRes.json();
      scores = progress.scores || {};
      cursor = progress.cursor || 0;
      setSyncStatus('saved', '● Tersinkron ✓');
      showToast('Progress berhasil dimuat dari Google Drive!');
    } else {
      setSyncStatus('saved', '● Terhubung ✓');
      showToast('Terhubung! Belum ada progress tersimpan.');
    }
    renderCard();
    updateProgress();
  } catch (e) {
    setSyncStatus('error', '● Gagal memuat');
    showToast('Gagal memuat dari Drive: ' + e.message);
  }
}

async function saveToGDrive() {
  if (!accessToken) { showToast('Login dulu ke Google Drive!'); return; }
  setSyncStatus('syncing', '● Menyimpan...');

  const payload = JSON.stringify({
    scores,
    cursor,
    savedAt: new Date().toISOString()
  });

  try {
    if (driveFileId) {
      // Update existing file
      await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,
        {
          method: 'PATCH',
          headers: {
            Authorization: 'Bearer ' + accessToken,
            'Content-Type': 'application/json'
          },
          body: payload
        }
      );
    } else {
      // Create new file in appDataFolder
      const meta = await fetch(
        'https://www.googleapis.com/drive/v3/files?fields=id',
        {
          method: 'POST',
          headers: {
            Authorization: 'Bearer ' + accessToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: FILE_NAME,
            parents: ['appDataFolder']
          })
        }
      );
      const metaData = await meta.json();
      driveFileId = metaData.id;

      await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,
        {
          method: 'PATCH',
          headers: {
            Authorization: 'Bearer ' + accessToken,
            'Content-Type': 'application/json'
          },
          body: payload
        }
      );
    }
    setSyncStatus('saved', '● Tersimpan ✓');
    saveToLocal();
    showToast('Progress tersimpan ke Google Drive!');
  } catch (e) {
    setSyncStatus('error', '● Gagal simpan');
    showToast('Gagal simpan: ' + e.message);
  }
}

// Auto-save 3 detik setelah rating
function scheduleSave() {
  saveToLocal();
  if (!accessToken) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToGDrive(), 3000);
}

// =========== LOCAL STORAGE FALLBACK ===========
function saveToLocal() {
  localStorage.setItem('kaishi_scores', JSON.stringify(scores));
  localStorage.setItem('kaishi_cursor', cursor);
}
function loadFromLocal() {
  try {
    const s = localStorage.getItem('kaishi_scores');
    if (s) scores = JSON.parse(s);
    const c = localStorage.getItem('kaishi_cursor');
    if (c) cursor = parseInt(c) || 0;
  } catch(e) {}
}

// =========== CARD LOGIC ===========
function currentCard() { return deck[cursor]; }

function renderCard() {
  if (!deck.length) return;
  const c = currentCard();
  document.getElementById('front-vocab').textContent = c.vocab;
  document.getElementById('front-reading').textContent = c.reading;
  document.getElementById('back-meaning').textContent = c.meaning;
  document.getElementById('back-reading').textContent = c.reading;
  document.getElementById('back-sentence-jp').textContent = cleanHtml(c.sentence_jp);
  document.getElementById('back-sentence-id').textContent = cleanHtml(c.sentence_id);
  document.getElementById('card-num').textContent = `${cursor+1} / ${deck.length}`;
  setFlipped(false);
}

function cleanHtml(str) {
  const d = document.createElement('div');
  d.innerHTML = str || '';
  return d.textContent || d.innerText || '';
}

function setFlipped(val) {
  flipped = val;
  document.getElementById('the-card').classList.toggle('flipped', flipped);
  document.getElementById('rating-buttons').style.display = flipped ? 'flex' : 'none';
  document.getElementById('nav-buttons').style.display = flipped ? 'none' : 'flex';
  document.getElementById('flip-hint').style.display = flipped ? 'none' : 'block';
}

function flipCard() { if (deck.length) setFlipped(!flipped); }
function nextCard() { if (cursor < deck.length - 1) { cursor++; renderCard(); updateProgress(); } }
function prevCard() { if (cursor > 0) { cursor--; renderCard(); updateProgress(); } }

function rate(r) {
  const c = currentCard();
  scores[c.vocab + c.reading] = r;
  buildReviewDeck();
  scheduleSave();
  if (cursor < deck.length - 1) { cursor++; renderCard(); updateProgress(); }
  else { showToast('Selesai! 🎉 Semua kartu sudah dipelajari.'); }
}

function buildReviewDeck() {
  reviewDeck = ALL_CARDS.filter(c => {
    const s = scores[c.vocab + c.reading];
    return s === 'again' || s === 'hard';
  });
}

function updateProgress() {
  if (!deck.length) return;
  const pct = (cursor / deck.length * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${cursor} / ${deck.length}`;
  const known = Object.values(scores).filter(s => s === 'good' || s === 'easy').length;
  const total = Object.keys(scores).length;
  document.getElementById('score-label').textContent = total ? `${known}/${total} paham` : '';
}

// =========== MODES ===========
function switchMode() {
  mode = document.getElementById('mode-select').value;
  cursor = 0;
  if (mode === 'random') {
    deck = shuffle([...ALL_CARDS]);
  } else if (mode === 'review') {
    buildReviewDeck();
    deck = reviewDeck.length ? shuffle([...reviewDeck]) : [...ALL_CARDS];
    if (!reviewDeck.length) showToast('Belum ada kartu untuk diulang!');
  } else if (mode === 'list') {
    showListView(); return;
  } else {
    deck = filterBySearch(ALL_CARDS);
  }
  showStudyView();
  renderCard();
  updateProgress();
}

function shuffleDeck() {
  deck = shuffle([...deck]);
  cursor = 0;
  renderCard();
  updateProgress();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function resetAll() {
  if (!confirm('Reset semua progress? Data di Drive tidak akan dihapus otomatis.')) return;
  scores = {};
  cursor = 0;
  deck = [...ALL_CARDS];
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('mode-select').value = 'study';
  mode = 'study';
  saveToLocal();
  showStudyView();
  renderCard();
  updateProgress();
  showToast('Progress direset (lokal)');
}

// =========== SEARCH ===========
function onSearch() {
  searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
  if (mode === 'list') { renderList(); return; }
  deck = filterBySearch(ALL_CARDS);
  cursor = 0;
  if (deck.length) renderCard();
  updateProgress();
}

function filterBySearch(arr) {
  if (!searchQuery) return arr;
  return arr.filter(c =>
    c.vocab.includes(searchQuery) ||
    c.reading.toLowerCase().includes(searchQuery) ||
    c.meaning.toLowerCase().includes(searchQuery) ||
    (c.sentence_id && c.sentence_id.toLowerCase().includes(searchQuery))
  );
}

// =========== LIST VIEW ===========
function showListView() {
  document.getElementById('study-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  renderList();
}
function showStudyView() {
  document.getElementById('study-view').style.display = 'flex';
  document.getElementById('list-view').style.display = 'none';
}
function renderList() {
  const filtered = filterBySearch(ALL_CARDS);
  const tbody = document.getElementById('list-body');
  tbody.innerHTML = '';
  document.getElementById('list-empty').style.display = filtered.length ? 'none' : 'block';
  filtered.slice(0, 500).forEach((c, i) => {
    const s = scores[c.vocab + c.reading];
    const dot = (s === 'good' || s === 'easy') ? '<span class="known-badge"></span>' : '';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="color:#bbb;font-size:.75rem">${i+1}</td>
      <td class="vocab-cell">${c.vocab}</td>
      <td class="reading-cell">${c.reading}</td>
      <td>${c.meaning}</td>
      <td style="color:#999;font-size:.78rem">${cleanHtml(c.sentence_id).substring(0,50)}…</td>
      <td>${dot}</td>`;
    tbody.appendChild(tr);
  });
  if (filtered.length > 500) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="6" style="text-align:center;padding:12px;color:#aaa;font-size:.8rem">+${filtered.length-500} kartu lagi</td>`;
    tbody.appendChild(tr);
  }
}

// =========== TOAST ===========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// =========== KEYBOARD ===========
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  else if (e.code === 'ArrowRight' && !flipped) nextCard();
  else if (e.code === 'ArrowLeft' && !flipped) prevCard();
  else if (e.code === 'Digit1' && flipped) rate('again');
  else if (e.code === 'Digit2' && flipped) rate('hard');
  else if (e.code === 'Digit3' && flipped) rate('good');
  else if (e.code === 'Digit4' && flipped) rate('easy');
});

// Touch swipe
let touchX = 0;
document.getElementById('study-view').addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.getElementById('study-view').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50 && !flipped) { dx > 0 ? prevCard() : nextCard(); }
});
</script>
